name: Daily Podcast

on:
  schedule:
    # Run at 00:00 UTC daily (08:00 Beijing time)
    - cron: "0 0 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  generate:
    name: Generate Daily Episodes (All Users)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: uv sync --frozen --no-dev

      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium

      - name: Generate podcasts for all users
        env:
          ENVIRONMENT: ${{ secrets.ENVIRONMENT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          RSS_FEEDS: ${{ secrets.RSS_FEEDS }}
          TTS_PROVIDER: ${{ secrets.TTS_PROVIDER }}
          INWORLD_API_KEY: ${{ secrets.INWORLD_API_KEY }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          LLM_PROVIDER_FILTER: ${{ secrets.LLM_PROVIDER_FILTER }}
          LLM_PROVIDER_KEYWORDS: ${{ secrets.LLM_PROVIDER_KEYWORDS }}
          LLM_PROVIDER_TITLE: ${{ secrets.LLM_PROVIDER_TITLE }}
        run: uv run python generate_all.py
