name: Daily Podcast

on:
  schedule:
    # Run at 00:00 UTC daily (08:00 Beijing time)
    - cron: "0 0 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  generate:
    name: Generate Daily Episode
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: uv sync --frozen --no-dev

      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium

      - name: Generate podcast
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          RSS_FEEDS: ${{ secrets.RSS_FEEDS }}
          DATABASE_URL: "sqlite:///data/podcast.db"
        run: uv run python generate.py

      - name: Upload database artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: podcast-db-${{ github.run_number }}
          path: backend/data/podcast.db
          retention-days: 7
